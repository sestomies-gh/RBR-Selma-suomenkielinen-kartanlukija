<html><body><div>

<style>
  .debug-controls {
    display: none;
  }
</style>
<div style='margin-bottom:10px;'>
  <label><b>fontti:</b></label>
  <select id="fontselect" onchange="document.body.style.fontFamily=this.value;">
    <option value="Verdana">Verdana</option>
    <option value="Segoe UI">Segoe UI</option>
    <option value="Arial">Arial</option>
    <option value="Tahoma">Tahoma</option>
    <option value="Calibri">Calibri</option>
    <option value="Roboto">Roboto</option>
    <option value="Open Sans">Open Sans</option>
    <option value="Courier New">Courier New</option>
    <option value="Times New Roman">Times New Roman</option>
  </select>
<div class="debug-controls">
  &nbsp;&nbsp;
  <label><b>Nuoli 1 väri:</b></label>
  <input type="color" id="arrow1" value="#000000" onchange="updateArrowColors()">

  <label><b>Nuoli 2 väri:</b></label>
  <input type="color" id="arrow2" value="#ff8800" onchange="updateArrowColors()">

  &nbsp;&nbsp;
  <label><b>Tekstin alkuväri:</b></label>
  <input type="color" id="startcolor" value="#0000ff" onchange="updateTextColors()">

  <label><b>Tekstin loppuväri:</b></label>
  <input type="color" id="endcolor" value="#ff0000" onchange="updateTextColors()">
</div>


<script>
function updateArrowColors() {
  const c1 = document.getElementById("arrow1").value;
  const c2 = document.getElementById("arrow2").value;
  const lines = document.querySelectorAll(".arrowline");

  lines.forEach((el, i) => {
    el.setAttribute("stroke", (i % 2 === 0) ? c1 : c2);
  });
}

function updateTextColors() {
  const start = document.getElementById("startcolor").value;
  const end = document.getElementById("endcolor").value;

  const rs = parseInt(start.substr(1,2),16);
  const gs = parseInt(start.substr(3,2),16);
  const bs = parseInt(start.substr(5,2),16);
  const re = parseInt(end.substr(1,2),16);
  const ge = parseInt(end.substr(3,2),16);
  const be = parseInt(end.substr(5,2),16);

  const svgs = document.querySelectorAll("svg");

  svgs.forEach(svg => {
    const items = svg.querySelectorAll(".arrowtext");

    items.forEach((el, i) => {
      const t = i / (items.length - 1);
      const r = Math.round(rs*(1-t) + re*t);
      const g = Math.round(gs*(1-t) + ge*t);
      const b = Math.round(bs*(1-t) + be*t);
      el.style.fill = `rgb(${r},${g},${b})`;
    });
  });
}


window.addEventListener("load", function() {
  setTimeout(() => {
    updateArrowColors();
    updateTextColors();
  }, 50);
});

function debugInfo() {
  const now = new Date().toLocaleTimeString();
  const items = document.querySelectorAll(".arrowtext");
  const lines = document.querySelectorAll(".arrowline");

  const dbg = document.getElementById("debugbox");
  dbg.innerHTML =
    "JS loaded: " + now +
    "<br>arrowtext count: " + items.length +
    "<br>arrowline count: " + lines.length +
    "<br>start color: " + document.getElementById("startcolor").value +
    "<br>end color: " + document.getElementById("endcolor").value;
}

window.addEventListener("load", function() {
  setTimeout(() => {
    updateArrowColors();
    updateTextColors();

  }, 50);
});

</script>
